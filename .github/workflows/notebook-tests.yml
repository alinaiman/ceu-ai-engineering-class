name: Notebook Tests
on:
  push:
    branches: [main]
jobs:
  test-notebooks:
    if: github.repository == 'zoltanctoth/ceu-ai-engineering-class'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zoltanctoth/ai-engineering-class:latest-release
    steps:
      - uses: actions/checkout@v4
      - name: Create .env from secret
        run: echo "$DOTENV_FILE" > .env
        env:
          DOTENV_FILE: ${{ secrets.DOTENV_FILE }}
      - name: Install dependencies (post-create command)
        run: uv sync
        env:
          PATH: /home/vscode/.local/bin:$PATH
      - name: Run env check notebook
        run: jupyter nbconvert --to notebook --execute notebooks/0_check_env_vars.ipynb --output /dev/null
        env:
          PATH: .venv/bin:/home/vscode/.local/bin:$PATH
          OPENAI_AGENTS_DISABLE_TRACING: "1"
      - name: Run RAG notebook
        run: jupyter nbconvert --to notebook --execute notebooks/4_rag.ipynb --output /dev/null
        env:
          PATH: .venv/bin:/home/vscode/.local/bin:$PATH
          OPENAI_AGENTS_DISABLE_TRACING: "1"
